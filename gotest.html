<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML Fullscreen Tester</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #1e1e1e;
        }

        #editor-container {
            display: flex;
            flex-direction: column;
            width: 100%;
            height: 100%;
        }

        textarea {
            flex: 1;
            width: 100%;
            padding: 20px;
            box-sizing: border-box;
            background: #252526;
            color: #d4d4d4;
            border: none;
            font-family: 'Consolas', monospace;
            font-size: 16px;
            outline: none;
            resize: none;
        }

        .btn-run {
            height: 60px;
            background: #007acc;
            color: white;
            border: none;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
        }

        #result-container {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: white;
            z-index: 9999;
        }

        #result-frame {
            width: 100%;
            height: 100%;
            border: none;
        }

        #back-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            padding: 10px 20px;
            background: rgba(0, 0, 0, 0.5);
            color: white;
            border: none;
            cursor: pointer;
            z-index: 10000;
        }
    </style>
</head>
<body>

    <div id="editor-container">
        <textarea id="code-input" placeholder="여기에 HTML 코드를 붙여넣으세요..."></textarea>
        <button class="btn-run" onclick="runCode()">실행하기 (전체화면)</button>
    </div>

    <div id="result-container">
        <iframe id="result-frame"></iframe>
        <button id="back-btn" onclick="closePreview()">← 에디터로 돌아가기</button>
    </div>

    <script>
        const input = document.getElementById('code-input');

        // [추가] 페이지 로드시 저장된 코드 불러오기
        window.onload = function() {
            const saved = localStorage.getItem('html_code');
            if (saved) {
                input.value = saved;
            }
        };

        // [추가] 입력할 때마다 로컬 스토리지에 저장
        input.addEventListener('input', function() {
            localStorage.setItem('html_code', input.value);
        });

        function runCode() {
            const code = input.value;
            const resultFrame = document.getElementById('result-frame');
            const resultContainer = document.getElementById('result-container');

            const doc = resultFrame.contentDocument || resultFrame.contentWindow.document;
            doc.open();
            doc.write(code);
            doc.close();

            resultContainer.style.display = 'block';
        }

        function closePreview() {
            document.getElementById('result-container').style.display = 'none';
        }

        document.addEventListener('keydown', function(e) {
            if (e.ctrlKey && e.key === 'Enter') runCode();
            if (e.key === 'Escape') closePreview();
        });
    </script>
</body>
</html>
