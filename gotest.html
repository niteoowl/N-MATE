<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML 실시간 테스트기</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: sans-serif;
            overflow: hidden;
        }

        /* 에디터 영역 */
        #editor-container {
            display: flex;
            flex-direction: column;
            width: 100%;
            height: 100%;
            background: #1e1e1e;
        }

        #code-input {
            flex: 1;
            width: 100%;
            padding: 20px;
            box-sizing: border-box;
            background: #252526;
            color: #d4d4d4;
            border: none;
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 16px;
            resize: none;
            outline: none;
        }

        .btn-run {
            height: 60px;
            background: #007acc;
            color: white;
            border: none;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-run:hover {
            background: #005f9e;
        }

        /* 결과 미리보기 영역 (전체화면) */
        #result-container {
            display: none; /* 처음엔 숨김 */
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: white;
            z-index: 9999;
        }

        #result-frame {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* 돌아가기 버튼 */
        #back-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            padding: 10px 20px;
            background: rgba(0, 0, 0, 0.5);
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            z-index: 10000;
            backdrop-filter: blur(5px);
        }

        #back-btn:hover {
            background: rgba(0, 0, 0, 0.8);
        }
    </style>
</head>
<body>

    <!-- 코드 입력 화면 -->
    <div id="editor-container">
        <textarea id="code-input" placeholder="여기에 HTML 코드를 붙여넣으세요..."></textarea>
        <button class="btn-run" onclick="runCode()">실행하기 (전체화면)</button>
    </div>

    <!-- 결과 화면 -->
    <div id="result-container">
        <iframe id="result-frame"></iframe>
        <button id="back-btn" onclick="closePreview()">← 에디터로 돌아가기</button>
    </div>

    <script>
        function runCode() {
            const code = document.getElementById('code-input').value;
            const resultFrame = document.getElementById('result-frame');
            const resultContainer = document.getElementById('result-container');

            // iframe 내용 채우기
            const doc = resultFrame.contentDocument || resultFrame.contentWindow.document;
            doc.open();
            doc.write(code);
            doc.close();

            // 화면 전환
            resultContainer.style.display = 'block';
        }

        function closePreview() {
            const resultContainer = document.getElementById('result-container');
            resultContainer.style.display = 'none';
            
            // 이전 실행 결과 초기화 (선택 사항)
            document.getElementById('result-frame').src = "about:blank";
        }

        // 단축키 지원: Ctrl + Enter 누르면 바로 실행
        document.addEventListener('keydown', function(e) {
            if (e.ctrlKey && e.key === 'Enter') {
                runCode();
            }
            if (e.key === 'Escape') {
                closePreview();
            }
        });
    </script>
</body>
</html>
