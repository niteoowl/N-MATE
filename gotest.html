<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML Fullscreen Tester</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #1e1e1e;
        }

        #editor {
            display: flex;
            flex-direction: column;
            width: 100%;
            height: 100%;
        }

        textarea {
            flex: 1;
            width: 100%;
            padding: 20px;
            box-sizing: border-box;
            background: #252526;
            color: #d4d4d4;
            border: none;
            font-family: 'Consolas', monospace;
            font-size: 16px;
            outline: none;
            resize: none;
        }

        button {
            height: 60px;
            background: #007acc;
            color: white;
            border: none;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
        }

        #view {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: white;
            z-index: 9999;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>

    <div id="editor">
        <textarea id="code" placeholder="HTML 코드를 여기에 붙여넣으세요."></textarea>
        <button onclick="run()">전체화면으로 보기</button>
    </div>

    <div id="view">
        <iframe id="preview"></iframe>
    </div>

    <script>
        const codeInput = document.getElementById('code');

        // 페이지 로드 시 저장된 코드 불러오기
        window.onload = function() {
            const savedData = localStorage.getItem('html_tester_code');
            if (savedData) {
                codeInput.value = savedData;
            }
        };

        // 입력할 때마다 실시간 저장
        codeInput.addEventListener('input', function() {
            localStorage.setItem('html_tester_code', codeInput.value);
        });

        function run() {
            const code = codeInput.value;
            const preview = document.getElementById('preview');
            const view = document.getElementById('view');

            const doc = preview.contentDocument || preview.contentWindow.document;
            doc.open();
            doc.write(code);
            doc.close();

            view.style.display = 'block';
        }

        // 단축키 설정
        document.addEventListener('keydown', function(e) {
            if (e.ctrlKey && e.key === 'Enter') run();
            
            // Esc 누르면 다시 에디터로
            if (e.key === 'Escape') {
                document.getElementById('view').style.display = 'none';
                document.getElementById('preview').src = "about:blank";
            }
        });
    </script>
</body>
</html>
