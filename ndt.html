<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>작가 전용 집필실 - 프로 에디션</title>
    <style>
        /* 기본 클래식 변수 설정 */
        :root {
            --bg-body: #f0f0f0;
            --bg-sidebar: #d1d1d1;
            --bg-sidebar-item: #e0e0e0;
            --bg-sidebar-active: #fff;
            --bg-toolbar: #e8e8e8;
            --bg-editor: #fafafa;
            --bg-status: #4a4a4a;
            --text-main: #333;
            --text-link: #0000ff;
            --text-status: #ddd;
            --border-color: #999;
            --input-bg: #fff;
        }

        /* 야간 모드 변수 설정 */
        body.dark-mode {
            --bg-body: #1a1a1a;
            --bg-sidebar: #2a2a2a;
            --bg-sidebar-item: #333;
            --bg-sidebar-active: #444;
            --bg-toolbar: #333;
            --bg-editor: #222;
            --bg-status: #000;
            --text-main: #ccc;
            --text-link: #58a6ff;
            --text-status: #888;
            --border-color: #444;
            --input-bg: #444;
        }

        body {
            margin: 0; padding: 0;
            font-family: "Malgun Gothic", "Dotum", sans-serif;
            background-color: var(--bg-body);
            color: var(--text-main);
            display: flex;
            height: 100vh;
            overflow: hidden;
            transition: background-color 0.2s;
        }

        /* 사이드바 */
        #sidebar {
            width: 250px;
            background-color: var(--bg-sidebar);
            border-right: 2px solid var(--border-color);
            display: flex;
            flex-direction: column;
            transition: transform 0.3s ease;
            z-index: 1001;
        }

        .sidebar-header {
            padding: 15px;
            background-color: #4a4a4a;
            color: white;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        #episode-list {
            flex: 1;
            overflow-y: auto;
            list-style: none;
            margin: 0; padding: 0;
        }

        .episode-item {
            padding: 12px 15px;
            border-bottom: 1px solid var(--border-color);
            cursor: pointer;
            background-color: var(--bg-sidebar-item);
            font-size: 14px;
            display: flex;
            justify-content: space-between;
            color: var(--text-main);
        }

        .episode-item.active {
            background-color: var(--bg-sidebar-active);
            font-weight: bold;
            border-left: 5px solid #4a4a4a;
        }

        /* 메인 영역 */
        #main-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .toolbar {
            padding: 8px 15px;
            background-color: var(--bg-toolbar);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            gap: 8px;
            align-items: center;
            flex-wrap: wrap;
        }

        .btn-tool {
            padding: 6px 12px;
            border: 1px solid var(--border-color);
            background-color: var(--input-bg);
            color: var(--text-main);
            cursor: pointer;
            font-size: 13px;
        }

        .btn-tool:hover { background-color: #eee; }
        body.dark-mode .btn-tool:hover { background-color: #555; }
        .btn-viewer { background-color: #4a4a4a; color: white; border-color: #333; }

        /* 에디터 컨테이너 */
        #workspace {
            flex: 1;
            display: flex;
            overflow: hidden;
            position: relative;
        }

        .editor-container {
            flex: 1;
            padding: 30px;
            overflow-y: auto;
            display: flex;
            justify-content: center;
            background-color: var(--bg-editor);
        }

        #editor {
            width: 100%;
            max-width: 800px;
            min-height: 100%;
            border: none;
            outline: none;
            resize: none;
            font-size: 18px;
            line-height: 1.8;
            font-family: serif;
            background: transparent;
            color: var(--text-main);
        }

        /* 뷰어 오버레이 */
        #viewer-overlay {
            display: none;
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: var(--bg-editor);
            z-index: 1005;
            flex-direction: column;
        }

        .viewer-toolbar {
            padding: 10px 20px;
            background: var(--bg-toolbar);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .viewer-content-area {
            flex: 1;
            overflow-y: auto;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
            background-color: var(--bg-body);
        }

        #viewer-display {
            background: var(--bg-sidebar-active);
            padding: 60px 40px;
            width: 100%;
            max-width: 700px;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
            min-height: 100%;
            line-height: 2;
            word-break: break-all;
            white-space: pre-wrap;
            color: var(--text-main);
        }

        /* 프레임 패널 */
        #frame-panel {
            width: 0;
            border-left: 0;
            transition: width 0.3s ease;
            background: var(--input-bg);
            display: flex;
            flex-direction: column;
        }

        #frame-panel.open {
            width: 45%;
            border-left: 2px solid var(--border-color);
        }

        /* 하단 상태바 */
        #status-bar {
            height: 28px;
            background-color: var(--bg-status);
            color: var(--text-status);
            display: flex;
            justify-content: space-between;
            padding: 0 15px;
            align-items: center;
            font-size: 11px;
        }

        /* 도구 메뉴 팝업 */
        #tools-menu {
            display: none;
            position: absolute;
            top: 50px; right: 20px;
            width: 280px;
            background: var(--input-bg);
            color: var(--text-main);
            border: 2px solid var(--border-color);
            box-shadow: 5px 5px 0px rgba(0,0,0,0.2);
            z-index: 1010;
            padding: 12px;
        }

        .tool-link-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 0;
            border-bottom: 1px dashed var(--border-color);
        }

        .tool-link-item a {
            font-size: 13px;
            color: var(--text-link);
            text-decoration: none;
            flex: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .tool-link-btns {
            display: flex;
            gap: 4px;
        }

        .btn-mini {
            padding: 2px 6px;
            font-size: 10px;
            border: 1px solid var(--border-color);
            background: var(--bg-body);
            color: var(--text-main);
            cursor: pointer;
        }

        @media (max-width: 768px) {
            #sidebar { position: fixed; left: 0; top: 0; bottom: 0; transform: translateX(-100%); }
            #sidebar.mobile-open { transform: translateX(0); }
            #frame-panel.open { width: 100%; position: fixed; top: 80px; bottom: 30px; right: 0; }
        }
    </style>
</head>
<body>

    <div id="sidebar">
        <div class="sidebar-header">
            <span>나의 서재</span>
            <button class="btn-tool" style="background:none; color:white; border:none;" onclick="toggleSidebar()">✕</button>
        </div>
        <button style="width:100%; padding:12px; background:#555; color:white; border:none; cursor:pointer;" onclick="openNewEpisodeModal()">+ 새 회차 추가</button>
        <ul id="episode-list"></ul>
    </div>

    <div id="main-wrapper">
        <div class="toolbar">
            <button class="btn-tool" onclick="toggleSidebar()">☰</button>
            <input type="text" id="episode-title" style="flex:1; padding:6px; background:var(--input-bg); color:var(--text-main); border:1px solid var(--border-color);" placeholder="회차 제목" oninput="saveCurrentData()">
            <button class="btn-tool" id="dark-toggle-btn" onclick="toggleDarkMode()">다크</button>
            <button class="btn-tool btn-viewer" onclick="openViewer()">Viewer</button>
            <button class="btn-tool" onclick="toggleToolsMenu()">Tools</button>
            <button class="btn-tool" onclick="downloadTxt()">TXT</button>
        </div>

        <div id="workspace">
            <div class="editor-container">
                <textarea id="editor" placeholder="이곳에 이야기를 집필하세요..." oninput="updateStats(); saveCurrentData();"></textarea>
            </div>
            
            <div id="frame-panel">
                <div style="padding:8px; background:#4a4a4a; color:white; display:flex; justify-content:space-between; font-size:12px;">
                    <span id="frame-title">참고 자료</span>
                    <button onclick="closeFrame()" style="background:none; border:none; color:white; cursor:pointer;">✕</button>
                </div>
                <iframe id="external-frame" style="flex:1; border:none;" src=""></iframe>
            </div>

            <div id="viewer-overlay">
                <div class="viewer-toolbar">
                    <div style="display:flex; gap:10px; align-items:center;">
                        <button class="btn-tool" onclick="closeViewer()">← 집필로 돌아가기</button>
                        <select onchange="changeViewerTheme(this.value)" style="background:var(--input-bg); color:var(--text-main);">
                            <option value="white">화이트</option>
                            <option value="sepia">세피아</option>
                            <option value="dark">야간모드</option>
                        </select>
                        <select onchange="changeViewerFontSize(this.value)" style="background:var(--input-bg); color:var(--text-main);">
                            <option value="16px">작게</option>
                            <option value="19px" selected>보통</option>
                            <option value="22px">크게</option>
                        </select>
                    </div>
                    <div>
                        <label style="font-size:13px;"><input type="checkbox" onchange="toggleMobileWidth(this.checked)"> 모바일 너비</label>
                    </div>
                </div>
                <div class="viewer-content-area">
                    <div id="viewer-display"></div>
                </div>
            </div>
        </div>

        <div id="tools-menu">
            <h4 style="margin:0 0 10px 0; font-size:14px; border-bottom:1px solid var(--border-color); padding-bottom:5px;">참고 사이트</h4>
            <div id="user-links-list"></div>
            <div style="margin-top:12px; padding-top:10px; border-top:1px solid var(--border-color);">
                <div style="display:flex; gap:4px; margin-bottom:5px;">
                    <input type="text" id="new-link-name" placeholder="이름" style="width:50%; background:var(--input-bg); color:var(--text-main); border:1px solid var(--border-color); font-size:11px;">
                    <input type="text" id="new-link-url" placeholder="URL" style="width:50%; background:var(--input-bg); color:var(--text-main); border:1px solid var(--border-color); font-size:11px;">
                </div>
                <button class="btn-tool" style="width:100%;" onclick="addUserLink()">즐겨찾기 추가</button>
            </div>
        </div>

        <div id="status-bar">
            <div id="save-status">대기 중</div>
            <div>
                공백포함: <strong id="char-all">0</strong> | 
                공백제외: <strong id="char-no-space">0</strong>
            </div>
        </div>
    </div>

    <!-- 새 회차 모달 -->
    <div id="modal-new" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:2000; justify-content:center; align-items:center;">
        <div style="background:var(--input-bg); color:var(--text-main); padding:20px; border:2px solid var(--border-color); width:300px;">
            <h3 style="margin-top:0;">새 회차 이름</h3>
            <input type="text" id="new-ep-input" style="width:100%; padding:8px; background:var(--input-bg); color:var(--text-main); border:1px solid var(--border-color); box-sizing:border-box;" placeholder="예: 7화. 운명의 날">
            <div style="text-align:right; margin-top:15px;">
                <button class="btn-tool" onclick="closeModal()">취소</button>
                <button class="btn-tool" onclick="confirmAddEpisode()">생성</button>
            </div>
        </div>
    </div>

    <script>
        let episodes = [];
        let userLinks = [];
        let currentId = null;

        window.onload = function() {
            // 다크모드 초기화
            if(localStorage.getItem('dark_mode_v6') === 'enabled') {
                document.body.classList.add('dark-mode');
                document.getElementById('dark-toggle-btn').innerText = "라이트";
            }

            const savedEp = localStorage.getItem('novel_episodes_v6');
            const savedLinks = localStorage.getItem('novel_links_v6');
            
            if(savedEp) episodes = JSON.parse(savedEp);
            if(savedLinks) userLinks = JSON.parse(savedLinks);
            else userLinks = [
                {name:'네이버 국어사전', url:'https://ko.dict.naver.com/'}, 
                {name:'맞춤법 검사기', url:'http://speller.cs.pusan.ac.kr/'}
            ];

            if(episodes.length === 0) episodes.push({id:Date.now(), title:'1화. 시작', content:''});
            currentId = episodes[0].id;
            
            renderEpisodes();
            renderLinks();
            loadEpisode(currentId);
        };

        function toggleDarkMode() {
            const isDark = document.body.classList.toggle('dark-mode');
            localStorage.setItem('dark_mode_v6', isDark ? 'enabled' : 'disabled');
            document.getElementById('dark-toggle-btn').innerText = isDark ? "라이트" : "다크";
        }

        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('mobile-open'); }
        function toggleToolsMenu() { 
            const m = document.getElementById('tools-menu'); 
            m.style.display = m.style.display === 'block' ? 'none' : 'block'; 
        }

        // 뷰어
        function openViewer() {
            const content = document.getElementById('editor').value;
            const display = document.getElementById('viewer-display');
            display.innerText = content;
            document.getElementById('viewer-overlay').style.display = 'flex';
        }
        function closeViewer() { document.getElementById('viewer-overlay').style.display = 'none'; }
        function changeViewerTheme(val) {
            const display = document.getElementById('viewer-display');
            display.classList.remove('viewer-sepia', 'viewer-dark');
            if(val === 'sepia') display.classList.add('viewer-sepia');
            if(val === 'dark') display.classList.add('viewer-dark');
        }
        function changeViewerFontSize(val) { document.getElementById('viewer-display').style.fontSize = val; }
        function toggleMobileWidth(isMobile) {
            const display = document.getElementById('viewer-display');
            if(isMobile) display.classList.add('viewer-mobile-width');
            else display.classList.remove('viewer-mobile-width');
        }

        // 링크 관리 (프레임 vs 새창)
        function renderLinks() {
            const list = document.getElementById('user-links-list');
            list.innerHTML = '';
            userLinks.forEach((link, idx) => {
                const d = document.createElement('div');
                d.className = 'tool-link-item';
                d.innerHTML = `
                    <a href="#" onclick="openInFrame('${link.url}', '${link.name}')" title="프레임으로 열기">${link.name}</a>
                    <div class="tool-link-btns">
                        <button class="btn-mini" onclick="window.open('${link.url}', '_blank')" title="새 창으로 열기">새창</button>
                        <button class="btn-mini" onclick="removeLink(${idx})" style="color:red;">✕</button>
                    </div>
                `;
                list.appendChild(d);
            });
        }

        function removeLink(idx) {
            userLinks.splice(idx, 1);
            localStorage.setItem('novel_links_v6', JSON.stringify(userLinks));
            renderLinks();
        }

        function addUserLink() {
            const n = document.getElementById('new-link-name').value;
            const u = document.getElementById('new-link-url').value;
            if(!n || !u) return;
            userLinks.push({name:n, url:u.startsWith('http')?u:'https://'+u});
            localStorage.setItem('novel_links_v6', JSON.stringify(userLinks));
            renderLinks();
            document.getElementById('new-link-name').value = '';
            document.getElementById('new-link-url').value = '';
        }

        function openInFrame(url, name) {
            document.getElementById('frame-title').innerText = name;
            document.getElementById('external-frame').src = url;
            document.getElementById('frame-panel').classList.add('open');
            toggleToolsMenu();
        }
        function closeFrame() { 
            document.getElementById('frame-panel').classList.remove('open');
            document.getElementById('external-frame').src = '';
        }

        // 에디터/데이터 로직
        function renderEpisodes() {
            const list = document.getElementById('episode-list');
            list.innerHTML = '';
            episodes.forEach(ep => {
                const li = document.createElement('li');
                li.className = 'episode-item' + (ep.id === currentId ? ' active' : '');
                li.innerHTML = `
                    <span onclick="loadEpisode(${ep.id})" style="flex:1;">${ep.title || '무제'}</span>
                    <span onclick="deleteEp(${ep.id})" style="color:red; cursor:pointer; font-weight:normal; margin-left:10px;">✕</span>
                `;
                list.appendChild(li);
            });
        }

        function loadEpisode(id) {
            currentId = id;
            const ep = episodes.find(e => e.id === id);
            document.getElementById('episode-title').value = ep.title;
            document.getElementById('editor').value = ep.content;
            updateStats(); renderEpisodes();
        }

        function saveCurrentData() {
            const idx = episodes.findIndex(e => e.id === currentId);
            if(idx === -1) return;
            episodes[idx].title = document.getElementById('episode-title').value;
            episodes[idx].content = document.getElementById('editor').value;
            localStorage.setItem('novel_episodes_v6', JSON.stringify(episodes));
            document.getElementById('save-status').innerText = "저장 완료 (" + new Date().toLocaleTimeString('ko-KR', {hour12:false, hour:'2-digit', minute:'2-digit'}) + ")";
        }

        function updateStats() {
            const v = document.getElementById('editor').value;
            document.getElementById('char-all').innerText = v.length.toLocaleString();
            document.getElementById('char-no-space').innerText = v.replace(/\s/g, '').length.toLocaleString();
        }

        function downloadTxt() {
            const blob = new Blob([document.getElementById('editor').value], {type:'text/plain'});
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = (document.getElementById('episode-title').value || '원고') + '.txt';
            a.click();
        }

        function openNewEpisodeModal() { document.getElementById('modal-new').style.display = 'flex'; }
        function closeModal() { document.getElementById('modal-new').style.display = 'none'; }
        function confirmAddEpisode() {
            const t = document.getElementById('new-ep-input').value || '새 회차';
            const ep = {id:Date.now(), title:t, content:''};
            episodes.push(ep); document.getElementById('new-ep-input').value = '';
            closeModal(); loadEpisode(ep.id);
        }
        function deleteEp(id) {
            if(episodes.length <= 1) return;
            if(!confirm("정말 이 회차를 삭제할까요?")) return;
            episodes = episodes.filter(e => e.id !== id);
            if(currentId === id) currentId = episodes[0].id;
            saveCurrentData(); loadEpisode(currentId);
        }
    </script>
</body>
</html>
